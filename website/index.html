<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulupandan Water District - Water Billing System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/common.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-section">
            <img src="assets/logo.png" alt="Pulupandan Water District Logo" class="logo-icon"
                style="width: 80px; height: 80px; object-fit: contain;">
            <div>
                <h1 class="logo-title">Pulupandan Water District</h1>
                <p class="logo-subtitle">Water Billing Management</p>
            </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Unified Login Header -->
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 style="font-size: 1.5rem; font-weight: 600; color: var(--text-primary);">Welcome Back</h2>
                <p style="color: var(--text-secondary); margin-top: 0.5rem;">Sign in to access your dashboard</p>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <circle cx="9" cy="5" r="3" stroke="currentColor" stroke-width="1.5" />
                            <path d="M3 16C3 12.6863 5.68629 10 9 10C12.3137 10 15 12.6863 15 16" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" />
                        </svg>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <rect x="3" y="7" width="12" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5" />
                            <path d="M6 7V5C6 3.34315 7.34315 2 9 2C10.6569 2 12 3.34315 12 5V7" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" />
                            <circle cx="9" cy="11.5" r="1" fill="currentColor" />
                        </svg>
                        <input type="password" id="password" class="form-input" placeholder="Enter your password"
                            required>
                        <button type="button" class="password-toggle" id="passwordToggle"
                            aria-label="Toggle password visibility">
                            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                                <path d="M1 9C1 9 4 3 9 3C14 3 17 9 17 9C17 9 14 15 9 15C4 15 1 9 1 9Z"
                                    stroke="currentColor" stroke-width="1.5" />
                                <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-footer">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Sign In</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </form>

            <!-- Trust Badge -->
            <div class="trust-badge">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1L3 3V7C3 10.5 5.5 13.5 8 15C10.5 13.5 13 10.5 13 7V3L8 1Z" stroke="#00897B"
                        stroke-width="1.5" stroke-linejoin="round" />
                    <path d="M6 8L7.5 9.5L10 6.5" stroke="#00897B" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <span>Secured with 256-bit SSL encryption</span>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Pulupandan Water District. All rights reserved.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="shared/utils.js"></script>
    <script src="script.js"></script>
</body>

</html>
